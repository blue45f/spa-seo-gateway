services:
  gateway:
    build: .
    image: spa-seo-gateway:latest
    container_name: spa-seo-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      LOG_LEVEL: info
      LOG_PRETTY: "false"
      GATEWAY_MODE: ${GATEWAY_MODE:-render-only}
      ORIGIN_URL: ${ORIGIN_URL:-}
      POOL_MIN: 2
      POOL_MAX: 8
      PAGE_TIMEOUT_MS: 25000
      WAIT_UNTIL: networkidle2
      WAIT_PRERENDER_READY: "true"
      MAX_REQUESTS_PER_BROWSER: 1000
      BLOCK_RESOURCE_TYPES: image,media,font
      BLOCK_URL_PATTERNS: google-analytics.com,googletagmanager.com,facebook.com/tr,doubleclick.net,segment.io,hotjar.com,mixpanel.com
      CACHE_ENABLED: "true"
      MEMORY_CACHE_ENABLED: "true"
      MEMORY_CACHE_MAX_ITEMS: 500
      MEMORY_CACHE_MAX_BYTES: 104857600
      MEMORY_CACHE_TTL_MS: 86400000
      REDIS_CACHE_ENABLED: "true"
      REDIS_URL: redis://redis:6379
      REDIS_CACHE_TTL_SEC: 604800
      SWR_WINDOW_MS: 3600000
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_MAX: 240
      RATE_LIMIT_WINDOW: "1 minute"
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    depends_on:
      redis:
        condition: service_healthy
    shm_size: "1gb"
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD","wget","-qO-","http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: spa-seo-redis
    restart: unless-stopped
    command:
      - redis-server
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
