name: Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'vercel.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/workflows/deploy-vercel.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Skip deployment when Vercel token is not configured
        if: env.VERCEL_TOKEN == ''
        run: echo "VERCEL_TOKEN is not configured; skipping Vercel deployment."

      - uses: pnpm/action-setup@v6
        if: env.VERCEL_TOKEN != ''

      - uses: actions/setup-node@v6
        if: env.VERCEL_TOKEN != ''
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: env.VERCEL_TOKEN != ''
        run: pnpm install --frozen-lockfile

      - name: Build for Vercel
        if: env.VERCEL_TOKEN != ''
        run: pnpm build

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: pnpm add -g vercel@latest

      - name: Deploy frontend to Vercel production
        if: env.VERCEL_TOKEN != ''
        run: |
          vercel deploy --prod --confirm --token "$VERCEL_TOKEN"
