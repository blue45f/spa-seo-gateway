name: Branch protection

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to protect
        required: false
        default: main
        type: string
      required_approving_review_count:
        description: Required human approvals. Use 0 to rely on required checks only.
        required: false
        default: '0'
        type: string

permissions:
  contents: read

concurrency:
  group: branch-protection-${{ github.event.inputs.branch || 'main' }}
  cancel-in-progress: false

env:
  REQUIRED_CHECKS_JSON: '["Quality gate","CodeRabbit review gate"]'

jobs:
  protect:
    name: Apply branch protection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate admin token
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error title=GH_ADMIN_TOKEN missing::Add a fine-grained token with repository Administration write permission."
            exit 1
          fi

      - name: Build branch protection payload
        env:
          REQUIRED_CHECKS_JSON: ${{ env.REQUIRED_CHECKS_JSON }}
          REQUIRED_APPROVING_REVIEW_COUNT: ${{ github.event.inputs.required_approving_review_count || '0' }}
        run: |
          set -euo pipefail

          jq -e 'type == "array" and length > 0 and all(.[]; type == "string" and length > 0)' <<< "$REQUIRED_CHECKS_JSON" >/dev/null

          jq -n \
            --argjson contexts "$REQUIRED_CHECKS_JSON" \
            --argjson review_count "$REQUIRED_APPROVING_REVIEW_COUNT" \
            '{
              required_status_checks: {
                strict: true,
                contexts: $contexts
              },
              enforce_admins: false,
              required_pull_request_reviews: {
                dismiss_stale_reviews: true,
                required_approving_review_count: $review_count,
                require_code_owner_reviews: false,
                require_last_push_approval: false
              },
              restrictions: null,
              required_linear_history: false,
              allow_force_pushes: false,
              allow_deletions: false,
              required_conversation_resolution: true
            }' > /tmp/protection.json

          cat /tmp/protection.json

      - name: Apply branch protection
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.inputs.branch || 'main' }}
        run: |
          set -euo pipefail

          gh api \
            --method PUT \
            "repos/$REPO/branches/$BRANCH/protection" \
            --input /tmp/protection.json

      - name: Show applied protection
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.inputs.branch || 'main' }}
        run: gh api "repos/$REPO/branches/$BRANCH/protection"
